<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CS 분석 대시보드</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
/* ═══════════════ RESET & BASE ═══════════════ */
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:#f4f7fc;color:#333;line-height:1.6;font-size:15px;}
a{color:#0055a5;text-decoration:none;}

/* ═══════════════ HEADER ═══════════════ */
.header{background:linear-gradient(135deg,#1a3a6c 0%,#0055a5 50%,#2196f3 100%);color:#fff;padding:24px 32px;text-align:center;border-radius:0 0 18px 18px;margin-bottom:20px;box-shadow:0 4px 20px rgba(0,0,0,.15);}
.header h1{font-size:2em;font-weight:800;letter-spacing:1px;}
.header p{font-size:.95em;opacity:.85;margin-top:4px;}

/* ═══════════════ UPLOAD ═══════════════ */
#uploadArea{max-width:640px;margin:40px auto;padding:48px 32px;background:#fff;border:3px dashed #90caf9;border-radius:16px;text-align:center;cursor:pointer;transition:all .2s;}
#uploadArea:hover{border-color:#2196f3;background:#e3f2fd;}
#uploadArea h2{color:#1a3a6c;margin-bottom:8px;}
#uploadArea p{color:#666;font-size:.92em;}
#fileInput{display:none;}

/* ═══════════════ DASHBOARD ═══════════════ */
#dashboard{max-width:1600px;margin:0 auto;padding:0 24px 40px;}

/* ═══════════════ TAB NAV ═══════════════ */
.tab-nav{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px;padding:6px;background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.tab-btn{padding:10px 20px;border:none;background:transparent;border-radius:20px;font-size:1em;font-weight:600;cursor:pointer;color:#546e7a;transition:all .2s;}
.tab-btn:hover{background:#e3f2fd;color:#0055a5;}
.tab-btn.active{background:#0055a5;color:#fff;box-shadow:0 2px 8px rgba(0,85,165,.25);}
.tab-pane{display:none;}
.tab-pane.active{display:block;}

/* ═══════════════ CARDS / SECTIONS ═══════════════ */
.card{background:#fff;border-radius:14px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,.06);border-top:4px solid #0055a5;margin-bottom:16px;}
.card-red{background:#fff;border-radius:14px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,.06);border-top:4px solid #1a3a6c;margin-bottom:16px;}
.card-teal{background:#f0f2f5;border-radius:14px;padding:20px;border-left:4px solid #1a3a6c;margin-bottom:16px;}
.sec-head{font-size:1.15em;font-weight:700;color:#1a3a6c;border-left:4px solid #0055a5;padding-left:12px;margin:24px 0 12px;}

/* ═══════════════ KPI ROW ═══════════════ */
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:20px;}
.kpi{background:linear-gradient(135deg,#f8f9ff,#fff);border:1px solid #e8eaf6;border-radius:12px;padding:14px;text-align:center;position:relative;overflow:hidden;}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.kpi:nth-child(1)::before{background:#ffd600;}
.kpi:nth-child(2)::before{background:#42a5f5;}
.kpi:nth-child(3)::before{background:#66bb6a;}
.kpi:nth-child(4)::before{background:#ef5350;}
.kpi:nth-child(5)::before{background:#ab47bc;}
.kpi .ic{font-size:22px;}
.kpi .lb{font-size:13px;color:#78909c;margin:2px 0;}
.kpi .vl{font-size:28px;font-weight:800;color:#1a237e;}
.kpi .sb{font-size:12px;color:#90a4ae;}
.kpi-card{background:#fff;border-radius:12px;padding:18px 16px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.06);border-top:3px solid #0055a5;display:flex;flex-direction:column;justify-content:center;min-height:100px;}
.kpi-label{font-size:.9em;color:#546e7a;margin-bottom:6px;}
.kpi-value{font-size:1.7em;font-weight:800;color:#1a3a6c;line-height:1.2;}
.kpi-sub{font-size:.85em;color:#888;margin-top:6px;}
@media(max-width:900px){.kpi-row{grid-template-columns:repeat(3,1fr);}}
@media(max-width:600px){.kpi-row{grid-template-columns:repeat(2,1fr);}}

/* ═══════════════ GRID ═══════════════ */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
@media(max-width:768px){.grid-2,.grid-3{grid-template-columns:1fr;}}

/* ═══════════════ TABLES ═══════════════ */
.tbl{width:100%;border-collapse:separate;border-spacing:0;font-size:.92em;text-align:center;}
.tbl th{background:#1a3a6c;color:#fff;border:none;border-right:1px solid #234b80;border-bottom:1px solid #234b80;padding:7px 10px;font-weight:700;}
.tbl td{border:none;border-right:1px solid #e8e8e8;border-bottom:1px solid #e8e8e8;padding:6px 10px;background:#fff;}
.tbl td:first-child{border-left:1px solid #e8e8e8;}
.tbl thead th{position:sticky;z-index:3;box-shadow:0 1px 0 #15305a;}
.tbl thead tr:first-child th{top:0;}
.tbl thead tr:nth-child(2) th{top:35px;}
.tbl tr:hover td{background:#f5f8ff;}
.tbl-wrap{overflow-x:auto;max-height:500px;overflow-y:auto;margin-bottom:12px;}

/* ═══════════════ BUTTONS ═══════════════ */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border:none;border-radius:8px;font-size:.95em;font-weight:600;cursor:pointer;transition:all .2s;}
.btn-primary{background:#0055a5;color:#fff;}.btn-primary:hover{background:#003f7f;}
.btn-dl{background:#2e7d32;color:#fff;}.btn-dl:hover{background:#1b5e20;}
.btn-sm{padding:6px 14px;font-size:.88em;}

/* ═══════════════ SELECT ═══════════════ */
select{padding:8px 14px;border:1px solid #ccc;border-radius:8px;font-size:1em;background:#fff;}

/* ═══════════════ CHART CONTAINER ═══════════════ */
.chart-box{background:#fff;border-radius:12px;padding:16px;box-shadow:0 1px 6px rgba(0,0,0,.05);margin-bottom:16px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
.cbox{background:#fafafa;border-radius:10px;padding:14px;border:1px solid #eee;}
.cbox h3{font-size:14px;color:#455a64;margin-bottom:8px;font-weight:600;}
.cbox canvas{width:100%!important;}
.cbox-full{grid-column:1/-1;}
.cbox-full canvas{}
.gauge-wrap{display:flex;justify-content:center;align-items:center;margin:12px 0;}
.gauge-box{position:relative;display:flex;justify-content:center;}
.gauge-val{display:none;}
.sec-title{font-size:15px;font-weight:700;color:#1a237e;margin-bottom:10px;padding-bottom:5px;border-bottom:2px solid #e8eaf6;}
.sec{margin-bottom:24px;}
@media(max-width:900px){.row2{grid-template-columns:1fr;}}
canvas{max-width:100%;height:auto;}

/* ═══════════════ DIVIDER ═══════════════ */
.divider{border:none;border-top:1px solid #e0e0e0;margin:24px 0;}

/* ═══════════════ SENTIMENT BADGES ═══════════════ */
.badge{display:inline-block;padding:3px 10px;border-radius:10px;font-size:.9em;font-weight:600;color:#fff;}
.badge-pos{background:#1565c0;}.badge-neg{background:#c62828;}.badge-neu{background:#757575;}

/* ═══════════════ RISK CARDS (Tab3) ═══════════════ */
.risk-card{border-radius:10px;padding:16px;margin-bottom:10px;border:1px solid #cfd8dc;border-left:4px solid #c62828;background:#f8f9fb;}
.risk-card .label{font-size:.88em;color:#1a3a6c;font-weight:700;}
.risk-card .title{font-size:1.1em;font-weight:800;margin:4px 0;color:#263238;}
.risk-card .score{font-size:1.5em;font-weight:900;color:#c62828;}
.drop-card{border:1px solid #cfd8dc;border-left:4px solid #e65100;background:#f8f9fb;}
.drop-card .label{color:#1a3a6c;}
.drop-card .score{color:#e65100;}

/* ═══════════════ VOC HIGHLIGHT ═══════════════ */
.voc-item{margin:6px 0;padding:8px 12px;background:#f8f9fb;border-left:4px solid #1a3a6c;border-radius:6px;font-size:.95em;}
.voc-item mark{background:#ffeb3b;padding:0 2px;border-radius:2px;}

/* ═══════════════ LOADING ═══════════════ */
.loading{text-align:center;padding:40px;color:#888;font-size:1.1em;}

/* ═══════════════ HEADER CARD (Tab3 solution) ═══════════════ */
.sol-header{background:linear-gradient(135deg,#1a237e 0%,#283593 60%,#1565c0 100%);border-radius:12px;padding:20px 24px;color:#fff;margin-bottom:20px;}
.sol-header .title{font-size:1.25em;font-weight:800;margin-bottom:14px;}
.sol-metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px;}
.sol-metric{background:rgba(255,255,255,.13);border-radius:8px;padding:12px;text-align:center;}
.sol-metric .lbl{font-size:.82em;opacity:.8;margin-bottom:4px;}
.sol-metric .val{font-size:1.9em;font-weight:900;}
.sol-metric .sub{font-size:.85em;opacity:.75;}
.sol-diag{background:rgba(255,255,255,.1);border-radius:8px;padding:10px 14px;font-size:.95em;border-left:4px solid #80cbc4;}

/* risk header */
.risk-header{background:linear-gradient(135deg,#1a237e 0%,#283593 60%,#1565c0 100%);border-radius:10px;padding:14px 20px;color:#fff;margin:8px 0 12px;}
.purple-header{background:linear-gradient(135deg,#1a237e 0%,#283593 60%,#1565c0 100%);border-radius:10px;padding:16px 22px;color:#fff;margin:16px 0 12px;}

@media(max-width:900px){.sol-metrics{grid-template-columns:repeat(2,1fr);}}
</style>
</head>
<body>
<div id="app">

<!-- HEADER -->
<div class="header">
  <h1>⚡ 고객경험관리시스템 조사결과 분석 대시보드</h1>
  <p>한국전력공사 경남본부 </p>
</div>

<!-- UPLOAD AREA -->
<div id="uploadArea" onclick="document.getElementById('fileInput').click()">
  <h2>엑셀 파일 업로드</h2>
  <p>엑셀(.xlsx) 또는 CSV 파일을 드래그하거나 클릭하여 선택하세요.</p>
  <p style="margin-top:12px;font-size:.82em;color:#999;">파일을 업로드하면 자동으로 분석이 시작됩니다.</p>
  <input type="file" id="fileInput" accept=".xlsx,.xls,.csv">
</div>

<!-- DASHBOARD (hidden until data loaded) -->
<div id="dashboard" style="display:none;">
  <!-- TAB NAV -->
  <div class="tab-nav">
    <button class="tab-btn active" onclick="switchTab(0)">📊 종합 현황</button>
    <button class="tab-btn" onclick="switchTab(1)">📋 항목별 분석</button>
    <button class="tab-btn" onclick="switchTab(2)">🎯 지사 맞춤형 CS 솔루션</button>
    <button class="tab-btn" onclick="switchTab(3)">📅 주간 리포트</button>
    <button class="tab-btn" onclick="switchTab(4)">🚨 민원 조기 경보</button>
  </div>

  <!-- TAB 1: 종합 현황 -->
  <div id="t0" class="tab-pane active"></div>
  <!-- TAB 2: 항목별 분석 -->
  <div id="t1" class="tab-pane"></div>
  <!-- TAB 3: 지사 맞춤형 CS 솔루션 -->
  <div id="t2" class="tab-pane"></div>
  <!-- TAB 4: 주간 리포트 -->
  <div id="t3" class="tab-pane"></div>
  <!-- TAB 5: 민원 조기 경보 -->
  <div id="t4" class="tab-pane"></div>
</div>

</div>

/* ═══════════ UTILITY FUNCTIONS ═══════════ */
function sortOffices(arr) {
  const om = {}; OFC_ORDER.forEach((v,i)=>om[v]=i);
  const known = arr.filter(v=>v in om).sort((a,b)=>om[a]-om[b]);
  const unknown = arr.filter(v=>!(v in om)).sort();
  return [...known,...unknown];
}
function sortBiz(arr) {
  const om = {}; BIZ_ORDER.forEach((v,i)=>om[v]=i);
  return arr.slice().sort((a,b)=>(om[a]??999)-(om[b]??999));
}

/* ═══════════ SENTIMENT ANALYSIS ═══════════ */
function hasPositiveConclusion(text){
  const s=String(text);
  const m=ADVERSATIVE_RE.exec(s);
  if(m){
    const after=s.substring(m.index+m[0].length);
    if(POSITIVE_CONTEXT.some(pw=>after.includes(pw))) return true;
  }
  const tail=s.length>40?s.substring(s.length-40):s;
  const tp=POSITIVE_CONTEXT.filter(pw=>tail.includes(pw)).length;
  const tn=NEGATIVE_KEYWORDS.filter(kw=>tail.includes(kw)).length;
  if(tp>0&&tp>tn) return true;
  return false;
}
function hasPositiveContext(text,keyword){
  const s=String(text);
  const idx=s.indexOf(keyword);
  if(idx===-1) return false;
  const start=Math.max(0,idx-20);
  const end=Math.min(s.length,idx+keyword.length+20);
  const win=s.substring(start,end);
  return POSITIVE_CONTEXT.some(pw=>win.includes(pw));
}
function checkNegative(text){
  if(!text||isVocEmpty(text)) return {is:false,kws:[]};
  const s=String(text);
  if(hasPositiveConclusion(s)) return {is:false,kws:[]};
  const found=NEGATIVE_KEYWORDS.filter(kw=>s.includes(kw));
  const real=found.filter(kw=>!hasPositiveContext(s,kw));
  return {is:real.length>0,kws:real};
}
function checkRude(text){
  if(!text||isVocEmpty(text)) return {is:false,kws:[]};
  const s=String(text);
  if(hasPositiveConclusion(s)) return {is:false,kws:[]};
  const found=RUDE_KEYWORDS.filter(kw=>s.includes(kw));
  const real=found.filter(kw=>!hasPositiveContext(s,kw));
  return {is:real.length>0,kws:real};
}
function classifySentiment3(text,score){
  if(!text||isVocEmpty(text)){
    if(score!=null&&score>=100) return '긍정';
    return '중립';
  }
  const s=String(text);
  if(hasPositiveConclusion(s)) return '긍정';
  const posCnt=POS_KW.filter(kw=>s.includes(kw)).length;
  let adjNeg=0;
  [...NEGATIVE_KEYWORDS,...RUDE_KEYWORDS].forEach(kw=>{
    if(s.includes(kw)&&!hasPositiveContext(s,kw)) adjNeg++;
  });
  if(adjNeg>0&&adjNeg>=posCnt) return '부정';
  if(posCnt>0) return '긍정';
  return '중립';
}

/* ═══════════ VOC PHRASE EXTRACTION ═══════════ */
function extractVocPhrases(vocTexts,scores){
  const negCounts={};_NEG_PHRASES.forEach(([l])=>negCounts[l]=[]);
  const posCounts={};_POS_PHRASES.forEach(([l])=>posCounts[l]=[]);
  const notable=[];
  vocTexts.forEach((text,i)=>{
    const s=String(text).trim();
    if(!s||VOC_EMPTY.has(s)||s.length<3) return;
    const sc=scores[i]!=null&&!isNaN(scores[i])?parseFloat(scores[i]):null;
    if(sc!=null&&sc<80){
      for(const [label,patterns] of _NEG_PHRASES){
        for(const pat of patterns){
          try{if(new RegExp(pat).test(s)){negCounts[label].push(s);break;}}catch(e){}
        }
      }
    }
    if(sc!=null&&sc>=90){
      for(const [label,patterns] of _POS_PHRASES){
        for(const pat of patterns){
          try{if(new RegExp(pat).test(s)){posCounts[label].push(s);break;}}catch(e){}
        }
      }
    }
    for(const pat of _REQUEST_PATTERNS){
      try{if(new RegExp(pat).test(s)){notable.push([s,sc]);break;}}catch(e){}
    }
  });
  const negR=Object.entries(negCounts).filter(([,v])=>v.length>0).map(([l,v])=>[l,v.length,v.slice(0,2)]).sort((a,b)=>b[1]-a[1]);
  const posR=Object.entries(posCounts).filter(([,v])=>v.length>0).map(([l,v])=>[l,v.length,v.slice(0,2)]).sort((a,b)=>b[1]-a[1]);
  return {neg:negR,pos:posR,notable:notable.slice(0,10)};
}

/* ═══════════ HEATMAP COLOR ═══════════ */
function hmColor(v,lo,hi){
  if(v==null||isNaN(v)) return '#f5f5f5';
  const t=Math.max(0,Math.min(1,(v-lo)/(hi-lo||1)));
  const stops=[[0,'#C0392B'],[0.2,'#E67E22'],[0.4,'#F4D03F'],[0.6,'#A8D86B'],[0.8,'#58B368'],[1,'#1E6B3E']];
  let i=0;
  while(i<stops.length-1&&stops[i+1][0]<t) i++;
  const [t0,c0]=stops[i],[t1,c1]=stops[Math.min(i+1,stops.length-1)];
  const f=(t-t0)/(t1-t0||1);
  const hx=s=>parseInt(s,16);
  const r=Math.round(hx(c0.slice(1,3))+f*(hx(c1.slice(1,3))-hx(c0.slice(1,3))));
  const g=Math.round(hx(c0.slice(3,5))+f*(hx(c1.slice(3,5))-hx(c0.slice(3,5))));
  const b=Math.round(hx(c0.slice(5,7))+f*(hx(c1.slice(5,7))-hx(c0.slice(5,7))));
  return `rgb(${r},${g},${b})`;
}
function belowAvgColor(v,hqAvg){
  if(v==null||isNaN(v)||hqAvg==null) return '';
  const gap=hqAvg-v;
  if(gap<=0) return '';
  const t=Math.min(gap/10,1);
  const r=Math.round(237-(237-167)*t);
  const g=Math.round(233-(233-139)*t);
  const b=Math.round(254-(254-250)*t);
  return `background:rgba(${r},${g},${b},0.55);`;
}

  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=filename;

}

  '접수자구분','종합 점수','종합점수','서술 의견','서술의견',
  '이용 편리성','직원 친절도','전반적 만족','처리 신속도',
  '접수일자','조사일자','접수일','조사일','일자','날짜','등록일',
  '업무처리완료일','처리완료일','완료일','응답여부','응답 여부','접수번호',
  '연령','고객센터','회사ON'
]);

function detectHeaderRow(ws, maxScan) {
  maxScan = maxScan || 10;
  const range = XLSX.utils.decode_range(ws['!ref'] || 'A1');
  const endR = Math.min(range.e.r, maxScan - 1);
  for (let r = range.s.r; r <= endR; r++) {
    let matched = 0;
    for (let c = range.s.c; c <= range.e.c; c++) {
      const cell = ws[XLSX.utils.encode_cell({r: r, c: c})];
      if (cell && cell.v != null) {
        const v = String(cell.v).trim();
        if (_KNOWN_HEADERS.has(v)) matched++;
      }
    }
    if (matched >= 2) return r;
  }
  return 0;
}

document.getElementById('fileInput').addEventListener('change',function(e){
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=function(ev){
    const data=new Uint8Array(ev.target.result);
    const wb=XLSX.read(data,{type:'array',cellDates:true});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const headerRow=detectHeaderRow(ws);
    const json=XLSX.utils.sheet_to_json(ws,{defval:'',range:headerRow});
    if(json.length===0){alert('데이터가 없습니다.');return;}
    processData(json);
  };
  reader.readAsArrayBuffer(file);
});

/* ═══════════════════════════════════════════════════════════
   PROCESS DATA
   ═══════════════════════════════════════════════════════════ */
function processData(json){
  G.headers=Object.keys(json[0]);
  G.raw=json;

  // Column auto-mapping
  function findCol(keywords){
    for(const col of G.headers){
      const c=col.trim();
      for(const kw of keywords){ if(c.includes(kw)) return col; }
    }
    return null;
  }
  G.M={
    office: findCol(['지사','사업소']),
    channel: findCol(['접수자구분']),
    method: findCol(['신청방법']),
    reception: findCol(['접수종류']),
    contract: findCol(['계약종별']),
    business: findCol(['업무구분','업무유형']),
    score: findCol(['종합 점수','종합점수']),
    voc: findCol(['서술 의견','서술의견']),
    age: findCol(['연령']),
    date: findCol(['업무처리완료일','처리완료일','완료일','접수일자','조사일자','접수일','조사일','일자','날짜','등록일']),
    receipt_no: findCol(['접수번호']),
    response: findCol(['응답여부','응답 여부'])
  };

  // Detect individual score columns
  G.indivScores=[];
  const usedCols=new Set();
  for(const kw of SCORE_KEYWORDS){
    for(const col of G.headers){
      const c=col.trim().replace(/\s+/g,'');
      if(c.includes(kw.replace(/\s+/g,''))&&!usedCols.has(col)){
        // check numeric
        const hasNum=json.some(r=>{const v=parseFloat(r[col]);return !isNaN(v);});
        if(hasNum){G.indivScores.push(col);usedCols.add(col);break;}
      }
    }
  }

  // Score normalization: detect scale
  let scoreScale=1;
  if(G.M.score){
    const vals=json.map(r=>parseFloat(r[G.M.score])).filter(v=>!isNaN(v));
    if(vals.length>0){
      const mx=Math.max(...vals);
      if(mx<=5) scoreScale=20;
      else if(mx<=10) scoreScale=10;
    }
  }

  // Process rows
  G.data=json.map(r=>{
    const d={...r};
    // Score
    if(G.M.score){
      const sv=parseFloat(r[G.M.score]);
      d._score=isNaN(sv)?null:sv*scoreScale;
    }else{d._score=null;}
    // Individual scores
    for(const sc of G.indivScores){
      const sv=parseFloat(r[sc]);
      d['_is_'+sc]=isNaN(sv)?null:sv*scoreScale;
    }
    // Office
    d._office=G.M.office?String(r[G.M.office]||'').trim():'';
    // Channel
    d._channel=G.M.channel?String(r[G.M.channel]||'').trim():'';
    // Contract
    d._contract=G.M.contract?groupContract(r[G.M.contract]):null;
    // Business
    if(G.M.business){
      let bv=String(r[G.M.business]||'').trim();
      if(BIZ_RENAME[bv]) bv=BIZ_RENAME[bv];
      d._business=bv;
    }else{d._business='';}
    // VOC
    d._voc=G.M.voc?String(r[G.M.voc]||'').trim():'';
    // Sentiment
    d._sent=classifySentiment3(d._voc,d._score);
    // Negative/Rude check
    const negChk=checkNegative(d._voc);
    d._neg=negChk.is; d._negKws=negChk.kws;
    const rudeChk=checkRude(d._voc);
    d._rude=rudeChk.is; d._rudeKws=rudeChk.kws;
    // Bucket
    d._bucket=scoreBucket(d._score);
    // Response
    d._response=G.M.response?String(r[G.M.response]||'').trim():'';
    // Date
    d._date=null;
    if(G.M.date){
      const dv=r[G.M.date];
      if(dv instanceof Date&&!isNaN(dv)) d._date=dv;
      else{
        const parsed=new Date(dv);
        if(!isNaN(parsed)&&parsed.getFullYear()>=2020&&parsed.getFullYear()<=2030) d._date=parsed;
      }
    }
    if(!d._date&&G.M.receipt_no){
      // Parse from receipt_no
      const rn=String(r[G.M.receipt_no]||'');
      const parts=rn.split(/[-/]/);
      for(const p of parts){
        const pt=p.trim();
        if(pt.length===8&&/^\d+$/.test(pt)){
          const y=parseInt(pt.substring(0,4)),m=parseInt(pt.substring(4,6))-1,day=parseInt(pt.substring(6,8));
          const dt=new Date(y,m,day);
          if(!isNaN(dt)&&y>=2020&&y<=2030){d._date=dt;break;}
        }
      }
    }
    return d;
  });

  // Compute global stats
  const scoredData=G.data.filter(d=>d._score!=null);
  G.avgScore=scoredData.length>0?scoredData.reduce((s,d)=>s+d._score,0)/scoredData.length:0;

  // Offices
  if(G.M.office){
    const os=new Set(G.data.map(d=>d._office).filter(Boolean));
    G.offices=sortOffices([...os]);
  }
  // Channels
  if(G.M.channel){
    const cs=new Set(G.data.map(d=>d._channel).filter(Boolean));
    G.channels=[...cs].sort();
  }

  // Show dashboard
  document.getElementById('uploadArea').style.display='none';
  document.getElementById('dashboard').style.display='block';

  renderAll();
}

function drawGauge(value){
  const gc=document.getElementById('cGauge'); if(!gc) return;
  const dpr=window.devicePixelRatio||1;
  const box=gc.parentElement;
  const W=Math.min(box.clientWidth, 380);
  const H=W*0.72;
  gc.width=W*dpr; gc.height=H*dpr;
  gc.style.width=W+'px'; gc.style.height=H+'px';
  const g=gc.getContext('2d');
  g.scale(dpr,dpr);

  const cx=W/2, cy=H-40, R=Math.min(W/2-20, H-70), thick=R*0.28;
  const SA=Math.PI, gap=0.02;

  // Color segments: [startRatio, endRatio, color]
  const segs=[
    [0, 0.3, '#e53935'],
    [0.3, 0.5, '#fb8c00'],
    [0.5, 0.7, '#fdd835'],
    [0.7, 0.85, '#7cb342'],
    [0.85, 1.0, '#2e7d32']
  ];
  segs.forEach(([s,e,c])=>{
    g.beginPath();
    g.arc(cx,cy,R, SA+s*Math.PI+gap, SA+e*Math.PI-gap);
    g.lineWidth=thick; g.strokeStyle=c; g.lineCap='butt'; g.stroke();
  });

  if(value==null||isNaN(value)) return;
  const ratio=Math.min(Math.max(value/100,0),1);

  // Needle at score position
  const needleA=-Math.PI/2+ratio*Math.PI;
  const nl=R*0.75;
  g.save();
  g.translate(cx,cy);
  g.rotate(needleA);
  g.beginPath();
  g.moveTo(-4,0); g.lineTo(0,-nl); g.lineTo(4,0);
  g.closePath();
  g.fillStyle='#37474f'; g.fill();
  g.restore();
  g.beginPath(); g.arc(cx,cy,7,0,Math.PI*2);
  g.fillStyle='#37474f'; g.fill();

  // Tick labels
  g.font='12px "Malgun Gothic",sans-serif'; g.fillStyle='#888'; g.textAlign='center';
  [0,30,50,70,100].forEach(t=>{
    const a=SA+(t/100)*Math.PI;
    const tx=cx+Math.cos(a)*(R+thick/2+14);
    const ty=cy+Math.sin(a)*(R+thick/2+14);
    g.fillText(t,tx,ty);
  });

  // Score below gauge
  g.textAlign='center'; g.textBaseline='top';
  g.font='bold 24px "Malgun Gothic",sans-serif'; g.fillStyle='#1a237e';
  g.fillText(value.toFixed(1)+'점', cx, cy+10);
}

function drawDistChart(scored){
  const bk={'90점 이상':0,'70~90점':0,'50~70점':0,'50점 미만':0};
  scored.forEach(d=>{const b=d._bucket;if(b in bk)bk[b]++;});
  const totalSc=Object.values(bk).reduce((a,b)=>a+b,0);
  const labels=Object.keys(bk).map(k=>{const p=totalSc?(bk[k]/totalSc*100).toFixed(1):0;return`${k}  ${bk[k].toLocaleString()}건 (${p}%)`;});
  destroyChart('cDist');
  G.chartInstances['cDist']=new Chart(document.getElementById('cDist'),{
    type:'doughnut',
    data:{labels,datasets:[{data:Object.values(bk),backgroundColor:['#1a3a6c','#00897B','#f59e0b','#e65100'],borderWidth:3,borderColor:'#fff',hoverOffset:6}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'55%',plugins:{
      legend:{position:'right',labels:{font:{size:14},padding:10}},
      tooltip:{callbacks:{title:()=>'',label:function(ctx){
        const k=Object.keys(bk)[ctx.dataIndex];
        const cnt=Object.values(bk)[ctx.dataIndex];
        const pct=totalSc?(cnt/totalSc*100).toFixed(1):'0';
        return `${k}  ${cnt.toLocaleString()}건  ${pct}%`;
      }}}
    }},
    plugins:[{
      id:'centerText',
      afterDraw(chart){
        const {ctx,width,height}=chart;
        const meta=chart.getDatasetMeta(0);
        if(!meta.data.length)return;
        const centerX=(chart.chartArea.left+chart.chartArea.right)/2;
        const centerY=(chart.chartArea.top+chart.chartArea.bottom)/2;
        ctx.save();
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.font='bold 24px "Malgun Gothic",sans-serif'; ctx.fillStyle='#1a237e';
        ctx.fillText(totalSc.toLocaleString()+'건', centerX, centerY-8);
        ctx.font='15px "Malgun Gothic",sans-serif'; ctx.fillStyle='#555';
        ctx.fillText('응답자', centerX, centerY+12);
        ctx.restore();
      }
    }]
  });
}

function drawContractDonut(){
  const gr={};
  G.data.filter(d=>d._score!=null).forEach(d=>{const c=d._contract;if(c)gr[c]=(gr[c]||0)+1;});
  const CT_ORDER=['주택용','일반용','산업용','교육용','농사용','가로등','기타'];
  const lb=sortOffices(Object.keys(gr));
  const lbSorted=[...lb].sort((a,b)=>{const ai=CT_ORDER.indexOf(a),bi=CT_ORDER.indexOf(b);return(ai<0?999:ai)-(bi<0?999:bi);});
  const total=lbSorted.reduce((s,l)=>s+gr[l],0);
  const lblWithPct=lbSorted.map(l=>{const p=(gr[l]/total*100).toFixed(1);return`${l}  ${gr[l].toLocaleString()}건 (${p}%)`;});
  destroyChart('cContract');
  const ctColors=['#1a3a6c','#1a5a7c','#0d7377','#00897B','#26a69a','#4DB6AC','#80CBC4'];
  G.chartInstances['cContract']=new Chart(document.getElementById('cContract'),{
    type:'doughnut',
    data:{labels:lblWithPct,datasets:[{data:lbSorted.map(l=>gr[l]),backgroundColor:ctColors.slice(0,lbSorted.length),borderWidth:2,borderColor:'#fff'}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'55%',
      plugins:{legend:{position:'right',labels:{font:{size:14},padding:10}},
        tooltip:{callbacks:{title:()=>'',label:function(ctx){
          const name=lbSorted[ctx.dataIndex];
          const cnt=gr[name];
          const pct=(cnt/total*100).toFixed(1);
          return `${name}  ${cnt.toLocaleString()}건  ${pct}%`;
        }}}}
    }
  });
}

function drawBizBar(){

  G.data.filter(d=>d._score!=null).forEach(d=>{const b=d._business;if(b)gr[b]=(gr[b]||0)+1;});

function buildItemTable(){
  const data=G.data;
  const offices=sortOffices([...new Set(data.filter(d=>d._office).map(d=>d._office))]);
  const hdr='#1a3a6c',bdr='#b0b0b0';
  const cols=['구분','업무처리건수','응답호수',...G.indivScores.map(c=>c.replace(/\s+/g,' ')),'종합점수'];
  let h='<div class="tbl-wrap"><table class="tbl">';
  h+=`<thead><tr style="background:${hdr};font-weight:bold;">${cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead><tbody>`;

  // HQ row
  const allScored=data.filter(d=>d._score!=null);
  let sentCount=0;
  if(G.M.response){
    sentCount=data.filter(d=>{const r=d._response;return r==='응답'||r==='미응답';}).length;
  }
  const hqS='background:#dce8f5;border-bottom:3px double '+bdr+';';
  const hqRow=[`<td style="${hqS}font-weight:bold;">본부</td>`,
    `<td style="${hqS}">${data.length.toLocaleString()}</td>`,
    `<td style="${hqS}">${G.M.response?sentCount.toLocaleString():allScored.length.toLocaleString()}</td>`];
  G.indivScores.forEach(sc=>{
    const vals=data.map(d=>d['_is_'+sc]).filter(v=>v!=null);
    const avg=vals.length>0?vals.reduce((a,b)=>a+b,0)/vals.length:null;
    hqRow.push(`<td style="${hqS}">${pf(avg)}</td>`);
  });
  hqRow.push(`<td style="${hqS}font-weight:bold;">${pf(G.avgScore)}</td>`);
  h+=`<tr style="font-weight:bold;">${hqRow.join('')}</tr>`;

  offices.forEach(ofc=>{
    const od=data.filter(d=>d._office===ofc);
    const os=od.filter(d=>d._score!=null);
    let oSent=0;
    if(G.M.response) oSent=od.filter(d=>{const r=d._response;return r==='응답'||r==='미응답';}).length;
    let row=`<td style="background:#fff;font-weight:bold;">${ofc}</td>`;
    row+=`<td>${od.length.toLocaleString()}</td>`;
    row+=`<td>${G.M.response?oSent.toLocaleString():os.length.toLocaleString()}</td>`;
    G.indivScores.forEach(sc=>{
      const vals=od.map(d=>d['_is_'+sc]).filter(v=>v!=null);
      const avg=vals.length>0?vals.reduce((a,b)=>a+b,0)/vals.length:null;
      row+=`<td>${pf(avg)}</td>`;
    });
    const oAvg=os.length>0?os.reduce((s,d)=>s+d._score,0)/os.length:null;
    row+=`<td style="font-weight:bold;">${pf(oAvg)}</td>`;
    h+=`<tr>${row}</tr>`;
  });

  h+='</tbody></table><div style="text-align:right;font-size:.8em;margin-top:4px;color:#555;">(단위 : 호, 점)</div></div>';
  h+=`<button class="btn btn-dl btn-sm" onclick="downloadExcel(document.querySelector('#t1 .tbl-wrap table').outerHTML,'항목별_결과.xls')">Excel 다운로드</button>`;
  return h;
}

function buildCatBarChart(catKey,catLabel){
  const data=G.data.filter(d=>d._score!=null);
  const catField=catKey==='contract'?'_contract':'_business';
  const globalAvg=G.avgScore;

  const catGroups={};
  data.forEach(d=>{
    const cv=d[catField];if(!cv)return;
    if(!catGroups[cv]) catGroups[cv]={sum:0,cnt:0};
    catGroups[cv].sum+=d._score;catGroups[cv].cnt++;
  });

  const entries=Object.entries(catGroups).map(([k,v])=>({name:k,avg:v.sum/v.cnt,cnt:v.cnt}));
  entries.sort((a,b)=>b.avg-a.avg);
  const bottom3=entries.slice(-3).reverse();
  const isBiz=catKey==='business';
  const chartId=catKey+'BarChart';
  const barH=Math.max(24,Math.min(32,isBiz?24:30));
  const chartH=entries.length*barH+80;
  const wrapperId=catKey+'ChartWrap';

  let h='';

  // Bottom 3 cards
  h+=`<div class="grid-3" style="margin-bottom:14px;">`;
  bottom3.forEach(item=>{
    const gap=item.avg-globalAvg;
    h+=`<div style="border:2px solid #ef5350;border-radius:10px;padding:14px 18px;">
      <div style="font-weight:800;font-size:1.05em;"><span style="color:#c62828;">&#9679;</span> ${item.name}</div>
      <div style="margin-top:8px;font-size:.93em;line-height:1.7;">
        <b>평균:</b> ${item.avg.toFixed(1)}점<br>
        <b>응답:</b> ${item.cnt.toLocaleString()}건<br>
        <b>전체 대비:</b> <span style="color:${gap>=0?'#1565c0':'#c62828'};font-weight:700;">${gap>=0?'+':''}${gap.toFixed(1)}점</span>
      </div>
    </div>`;
  });
  h+=`</div>`;

  // Chart area
  if(isBiz){
    h+=`<div style="margin-bottom:12px;">
      <button class="btn btn-sm" onclick="const w=document.getElementById('${wrapperId}');w.style.display=w.style.display==='none'?'block':'none';this.textContent=w.style.display==='none'?'▶ 전체 업무유형 차트 보기':'▼ 차트 접기';" style="background:#f0f4f8;border:1px solid #d0d7de;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:.9em;">▶ 전체 업무유형 차트 보기</button>
    </div>`;
    h+=`<div id="${wrapperId}" style="display:none;">`;
  } else {
    h+=`<div id="${wrapperId}">`;
  }

  h+=`<p style="font-weight:700;color:#333;margin:0 0 6px 2px;">${catLabel}별 평균 만족도 <span style="color:#c62828;font-size:.88em;">(빨간색 = 하위 3개)</span></p>`;
  h+=`<div style="position:relative;height:${chartH}px;"><canvas id="${chartId}"></canvas></div>`;
  h+=`</div>`;

  // Defer chart drawing
  setTimeout(()=>{
    const canvas=document.getElementById(chartId);
    if(!canvas) return;
    const labels=entries.map(e=>e.name);
    const vals=entries.map(e=>+e.avg.toFixed(1));
    const bottom3Names=bottom3.map(b=>b.name);
    const colors=entries.map(e=>bottom3Names.includes(e.name)?'#ef5350':'#42a5f5');

    destroyChart(chartId);
    G.chartInstances[chartId]=new Chart(canvas,{
      type:'bar',
      data:{labels,datasets:[{data:vals,backgroundColor:colors,borderRadius:3,barThickness:barH-6,clip:false}]},
      options:{
        indexAxis:'y',responsive:true,maintainAspectRatio:false,
        plugins:{
          legend:{display:true,labels:{generateLabels:()=>[
            {text:'하위 3',fillStyle:'#ef5350',strokeStyle:'#ef5350',lineWidth:0},
            {text:'일반',fillStyle:'#42a5f5',strokeStyle:'#42a5f5',lineWidth:0}
          ],font:{size:13}}},
          tooltip:{callbacks:{title:()=>'',label:function(ctx){
            const e=entries[ctx.dataIndex];
            return `${e.name}  ${e.avg.toFixed(1)}점  ${e.cnt.toLocaleString()}건`;
          }}}
        },
        layout:{padding:{right:60}},
        scales:{
          x:{min:0,max:100,clip:false,title:{display:true,text:'평균만족도',font:{size:13}},ticks:{font:{size:12},stepSize:10},grid:{color:'#eee'}},
          y:{ticks:{font:{size:13}}}
        }
      },
      plugins:[{
        id:'catBarLabels',
        afterDatasetsDraw(chart){
          const ctx=chart.ctx;
          const meta=chart.getDatasetMeta(0);
          ctx.font='13px "Malgun Gothic",sans-serif';
          ctx.fillStyle='#333';
          ctx.textBaseline='middle';
          meta.data.forEach((bar,i)=>{
            ctx.fillText(vals[i].toFixed(1),bar.x+6,bar.y);
          });
        }
      },{
        id:'catAvgLine',
        afterDatasetsDraw(chart){
          const ctx=chart.ctx;
          const xScale=chart.scales.x;
          const x=xScale.getPixelForValue(globalAvg);
          const area=chart.chartArea;
          ctx.save();
          ctx.strokeStyle='#333';
          ctx.lineWidth=1.5;
          ctx.setLineDash([6,4]);
          ctx.beginPath();ctx.moveTo(x,area.top-10);ctx.lineTo(x,area.bottom);ctx.stroke();
          ctx.setLineDash([]);
          ctx.fillStyle='#333';
          ctx.font='bold 12px "Malgun Gothic",sans-serif';
          ctx.textAlign='center';
          ctx.fillText('▼ 전체 평균 '+globalAvg.toFixed(1),x,area.top-14);
          ctx.restore();
        }
      }]
    });
  },0);

  return h;
}

function buildCategorySection(catKey,catLabel){
  const data=G.data.filter(d=>d._score!=null);
  const catField=catKey==='contract'?'_contract':'_business';
  const officeField='_office';
  const globalAvg=G.avgScore;

  // Group by category
  const catGroups={};
  data.forEach(d=>{
    const cv=d[catField];if(!cv)return;
    if(!catGroups[cv]) catGroups[cv]={sum:0,cnt:0};
    catGroups[cv].sum+=d._score;catGroups[cv].cnt++;
  });

  // Sort categories
  let cats=Object.keys(catGroups);
  if(catKey==='business') cats=sortBiz(cats);
  else if(catKey==='contract'){
    const ctOrder=['주택용','일반용','산업용','농사용','교육용','가로등'];
    const ordered=ctOrder.filter(c=>cats.includes(c));
    const rest=cats.filter(c=>!ctOrder.includes(c));
    cats=[...ordered,...rest];
  }

  // Build heatmap table (offices x categories)
  const hdr='#1a3a6c',bdr='#b0b0b0';
  let h='';

  if(G.M.office){
    const offices=sortOffices([...new Set(data.filter(d=>d._office).map(d=>d._office))]);

    // Compute HQ averages per category
    const hqAvgs={};
    cats.forEach(c=>{
      const cd=data.filter(d=>d[catField]===c);
      hqAvgs[c]=cd.length>0?cd.reduce((s,d)=>s+d._score,0)/cd.length:null;
    });
    const hqTotal=data.reduce((s,d)=>s+d._score,0)/data.length;

    // Compute per-office bottom 3 (for business type)
    const isBiz=catKey==='business';
    const ofcBottom3={};
    if(isBiz){
      offices.forEach(ofc=>{
        const od=data.filter(d=>d._office===ofc);
        const catScores={};
        cats.forEach(c=>{
          const cd=od.filter(d=>d[catField]===c&&d._score!=null);
          if(cd.length>0) catScores[c]=cd.reduce((s,d)=>s+d._score,0)/cd.length;
        });
        const sorted=Object.entries(catScores).sort((a,b)=>a[1]-b[1]);
        ofcBottom3[ofc]={};
        sorted.slice(0,3).forEach(([c],i)=>{ofcBottom3[ofc][c]=i+1;});
      });
    }

    const isContract=catKey==='contract';
    const uid=catLabel.replace(/\s/g,'');
    h+=`<div class="tbl-wrap" id="tbl_${uid}"><table class="tbl">`;

    if(isContract){
      h+=`<thead>`;
      h+=`<tr><th></th>`;
      cats.forEach(c=>{h+=`<th colspan="2">${c}</th>`;});
      h+=`<th colspan="2">합계</th></tr>`;
      h+=`<tr style="font-size:.9em;"><th>지사</th>`;
      cats.forEach(()=>{h+=`<th>종합<br>점수</th><th>응답<br>호수</th>`;});
      h+=`<th>종합<br>점수</th><th>응답<br>호수</th></tr>`;
      h+=`</thead><tbody>`;
    } else {
      h+=`<thead><tr style="background:${hdr};font-weight:bold;"><th>구분</th>`;
      cats.forEach(c=>{h+=`<th>${c}</th>`;});
      h+=`<th>합계</th></tr></thead><tbody>`;
    }

    // HQ row
    const hqBg='background:#dce8f5;';
    h+=`<tr style="font-weight:bold;"><td style="${hqBg}border-bottom:3px double ${bdr};">본부</td>`;
    cats.forEach(c=>{
      const v=hqAvgs[c]; const vs=v!=null?v.toFixed(1):'';
      if(isContract){
        const cnt=data.filter(d=>d[catField]===c).length;
        h+=`<td style="${hqBg}border-bottom:3px double ${bdr};">${vs}</td><td style="${hqBg}border-bottom:3px double ${bdr};">${cnt}</td>`;
      }else{
        h+=`<td style="${hqBg}border-bottom:3px double ${bdr};">${vs}</td>`;
      }
    });
    const hqTs=hqTotal.toFixed(1);
    if(isContract){
      h+=`<td style="${hqBg}border-bottom:3px double ${bdr};font-weight:bold;">${hqTs}</td><td style="${hqBg}border-bottom:3px double ${bdr};">${data.length}</td>`;
    }else{
      h+=`<td style="${hqBg}border-bottom:3px double ${bdr};font-weight:bold;">${hqTs}</td>`;
    }
    h+=`</tr>`;

    // Data rows
    offices.forEach(ofc=>{
      const od=data.filter(d=>d._office===ofc);
      h+=`<tr><td style="background:#fff;font-weight:bold;">${ofc}</td>`;
      cats.forEach(c=>{
        const cd=od.filter(d=>d[catField]===c&&d._score!=null);
        const avg=cd.length>0?cd.reduce((s,d)=>s+d._score,0)/cd.length:null;
        const vs=avg!=null?avg.toFixed(1):'';
        const bg=belowAvgColor(avg,hqAvgs[c]);
        if(isContract){
          h+=`<td style="${bg}">${vs}</td><td>${cd.length||''}</td>`;
        }else{
          const rank=ofcBottom3[ofc]?.[c];
          if(rank){
            h+=`<td style="${bg}color:#d32f2f;font-weight:bold;">${vs} <span style="font-size:.8em;">(&#9660;${rank})</span></td>`;
          }else{
            h+=`<td style="${bg}">${vs}</td>`;
          }
        }
      });
      // Total
      const oAvg=od.length>0?od.filter(d=>d._score!=null).reduce((s,d)=>s+d._score,0)/od.filter(d=>d._score!=null).length:null;
      const tBg=belowAvgColor(oAvg,hqTotal);
      if(isContract){
        h+=`<td style="font-weight:bold;">${oAvg!=null?oAvg.toFixed(1):''}</td><td>${od.filter(d=>d._score!=null).length}</td>`;
      }else{
        h+=`<td style="font-weight:bold;">${oAvg!=null?oAvg.toFixed(1):''}</td>`;
      }
      h+=`</tr>`;
    });

    const unit=isContract?'(단위 : 호, 점)':'(단위 : 점)';
    h+=`</tbody></table><div style="text-align:right;font-size:.8em;margin-top:4px;color:#555;">${unit}</div></div>`;
    h+=`<button class="btn btn-dl btn-sm" onclick="downloadExcel(document.querySelector('#tbl_${uid} table').outerHTML,'지사별_${catLabel}_만족도.xls')">Excel 다운로드</button>`;
  }

  return h;
}

function renderSolOffice(){
  const selOff=document.getElementById('solOfficeSel').value;
  const el=document.getElementById('solContent');
  const allData=G.data.filter(d=>d._score!=null);
  const ofcData=allData.filter(d=>d._office===selOff);
  if(ofcData.length===0){el.innerHTML='<div class="card"><p>해당 지사 데이터가 없습니다.</p></div>';return;}

  const selAvg=ofcData.reduce((s,d)=>s+d._score,0)/ofcData.length;
  const selGap=selAvg-G.avgScore;
  const selCnt=ofcData.length;

  // Rankings
  const allAvgs={};
  allData.forEach(d=>{if(d._office){if(!allAvgs[d._office])allAvgs[d._office]={sum:0,cnt:0};allAvgs[d._office].sum+=d._score;allAvgs[d._office].cnt++;}});
  const ranked=Object.entries(allAvgs).map(([k,v])=>[k,v.sum/v.cnt]).sort((a,b)=>b[1]-a[1]);
  const rank=ranked.findIndex(([k])=>k===selOff)+1;
  const totalOffs=ranked.length;

  // Peer group
  let peerLabel='1군',peerTier=1;
  if(PEER_2.has(selOff)){peerLabel='2군';peerTier=2;}
  const peerOffs=ranked.filter(([k])=>peerTier===1?PEER_1.has(k):PEER_2.has(k));
  const peerAvg=peerOffs.length>0?peerOffs.reduce((s,[,v])=>s+v,0)/peerOffs.length:0;
  const peerRanked=peerOffs.sort((a,b)=>b[1]-a[1]);
  const peerRank=peerRanked.findIndex(([k])=>k===selOff)+1;

  const reliability=selCnt>=50?'높음':selCnt>=20?'보통':'낮음';
  const gapColor=selGap>=0?'#80cbc4':'#ef9a9a';

  // Diagnosis
  let diag=`본부 평균 ${selGap>=0?'상회':'하회'}(${selGap>=0?'+':''}${selGap.toFixed(1)}점).`;
  if(G.M.business){
    const bizGroups={};
    ofcData.forEach(d=>{if(d._business){if(!bizGroups[d._business])bizGroups[d._business]={sum:0,cnt:0};bizGroups[d._business].sum+=d._score;bizGroups[d._business].cnt++;}});
    const bizAvgs=Object.entries(bizGroups).map(([k,v])=>[k,v.sum/v.cnt,v.cnt]);
    const bizGaps=bizAvgs.map(([k,v,c])=>[k,v-G.avgScore,v,c]);
    const worst=bizGaps.sort((a,b)=>a[1]-b[1])[0];
    if(worst&&worst[1]<-3){
      diag=`전반적으로 ${selGap>=0?'우수':'개선 필요'}하나, '${worst[0]}' 업무가 본부 평균보다 ${Math.abs(worst[1]).toFixed(1)}점 낮아 집중 개선 필요.`;
    }else if(selGap>=0){
      diag=`본부 평균을 ${selGap.toFixed(1)}점 상회하는 우수 지사입니다.`;
    }else{
      diag=`전반적 만족도가 본부 평균을 ${Math.abs(selGap).toFixed(1)}점 하회합니다. 전방위 개선이 필요합니다.`;
    }
  }

  let html=`
  <div class="sol-header">

function drawRadarChart(ofcData,selOff){
  const allData=G.data.filter(d=>d._score!=null);
  const bizSel={},bizAll={};
  ofcData.forEach(d=>{if(d._business){if(!bizSel[d._business])bizSel[d._business]={s:0,c:0};bizSel[d._business].s+=d._score;bizSel[d._business].c++;}});
  allData.forEach(d=>{if(d._business){if(!bizAll[d._business])bizAll[d._business]={s:0,c:0};bizAll[d._business].s+=d._score;bizAll[d._business].c++;}});
  // Only include categories present in BOTH office and HQ
  const cats=sortBiz(Object.keys(bizSel).filter(c=>bizAll[c]));
  if(cats.length<3) return;
  const selVals=cats.map(c=>+(bizSel[c].s/bizSel[c].c).toFixed(1));
  const allVals=cats.map(c=>+(bizAll[c].s/bizAll[c].c).toFixed(1));
  const allNums=[...selVals,...allVals].filter(v=>v>0);
  const rMin=Math.max(0,Math.floor((Math.min(...allNums)-5)/10)*10);

  destroyChart('radarChart');
  G.chartInstances['radarChart']=new Chart(document.getElementById('radarChart'),{
    type:'radar',data:{labels:cats,datasets:[
      {label:selOff,data:selVals,borderColor:'#FFD700',backgroundColor:'rgba(255,215,0,0.15)',borderWidth:2.5,pointRadius:4,pointBackgroundColor:'#FFD700'},
      {label:'본부 평균',data:allVals,borderColor:'#90a4ae',backgroundColor:'rgba(144,164,174,0.08)',borderWidth:1.5,borderDash:[5,5],pointRadius:2,pointBackgroundColor:'#90a4ae'}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      scales:{r:{min:rMin,max:105,ticks:{stepSize:10,font:{size:11}},pointLabels:{font:{size:13}}}},
      plugins:{legend:{position:'bottom',labels:{font:{size:13}}},tooltip:{callbacks:{label:ctx=>`${ctx.dataset.label}: ${ctx.raw}점`}}}
    }
  });

  // Strength/Weakness
  const gaps=cats.map((c,i)=>({biz:c,sel:selVals[i],all:allVals[i],gap:selVals[i]-allVals[i]}));
  gaps.sort((a,b)=>b.gap-a.gap);
  const sw=document.getElementById('strengthWeakness');
  if(sw){
    let sh=`<div class="grid-2" style="margin-top:10px;">
      <div style="background:#f0f2f5;border-left:4px solid #2e7d32;border-radius:8px;padding:10px 14px;font-size:.88em;"><b>강점 TOP 3</b><br>`;
    gaps.slice(0,3).forEach(g=>{sh+=`<span style="color:#2e7d32;">&#9679;</span> ${g.biz} - ${g.sel}점 (본부 대비 ${g.gap>=0?'+':''}${g.gap.toFixed(1)}점)<br>`;});
    sh+=`</div><div style="background:#f0f2f5;border-left:4px solid #c62828;border-radius:8px;padding:10px 14px;font-size:.88em;"><b>약점 TOP 3</b><br>`;
    const weak=gaps.slice().sort((a,b)=>a.gap-b.gap).slice(0,3);
    weak.forEach(g=>{sh+=`<span style="color:#c62828;">&#9679;</span> ${g.biz} - ${g.sel}점 (본부 대비 <b style="color:#c62828;">${g.gap>=0?'+':''}${g.gap.toFixed(1)}</b>점)<br>`;});
    sh+=`</div></div>`;
    sw.innerHTML=sh;
  }
}

function drawScatterChart(ofcData){
  const canvas=document.getElementById('scatterChart');
  if(!canvas) return;
  const ctGroups={};
  ofcData.forEach(d=>{if(d._contract&&d._score!=null){if(!ctGroups[d._contract])ctGroups[d._contract]={s:0,c:0};ctGroups[d._contract].s+=d._score;ctGroups[d._contract].c++;}});
  const items=Object.entries(ctGroups).filter(([,v])=>v.c>=2).map(([k,v])=>({label:k,x:v.c/ofcData.length*100,y:v.s/v.c,cnt:v.c}));
  if(items.length===0) return;
  const xMid=items.reduce((s,i)=>s+i.x,0)/items.length;
  const yMid=G.avgScore;
  const yMin=Math.max(55,Math.min(...items.map(i=>i.y))-5);
  const yMax=100;
  const xMax=100;

  function rdYlGn(v){
    const lo=Math.max(60,Math.min(...items.map(i=>i.y))-3);
    const hi=Math.min(100,Math.max(...items.map(i=>i.y))+3);
    const t=Math.max(0,Math.min(1,(v-lo)/(hi-lo||1)));
    const stops=[[0,230,81,0],[0.25,245,158,11],[0.5,178,223,219],[0.75,38,166,154],[1,0,137,123]];
    for(let i=0;i<stops.length-1;i++){
      const[t0,r0,g0,b0]=stops[i],[t1,r1,g1,b1]=stops[i+1];
      if(t<=t1){const p=(t-t0)/(t1-t0||1);return `rgba(${Math.round(r0+(r1-r0)*p)},${Math.round(g0+(g1-g0)*p)},${Math.round(b0+(b1-b0)*p)},0.75)`;}
    }
    return 'rgba(0,137,123,0.75)';
  }

  const crosshairPlugin={id:'crosshair',afterDraw(chart){
    const{ctx:c,chartArea:{left,right,top,bottom},scales:{x:sx,y:sy}}=chart;
    const xP=sx.getPixelForValue(xMid),yP=sy.getPixelForValue(yMid);
    c.save();c.setLineDash([6,4]);c.strokeStyle='#bdbdbd';c.lineWidth=1;
    c.beginPath();c.moveTo(xP,top);c.lineTo(xP,bottom);c.stroke();
    c.beginPath();c.moveTo(left,yP);c.lineTo(right,yP);c.stroke();
    c.setLineDash([]);
    c.font='12px Pretendard,sans-serif';
    c.fillStyle='#e65100';c.textAlign='left';c.fillText('🔍 특이 리스크',left+4,bottom-4);
    c.fillStyle='#c62828';c.textAlign='right';c.fillText('⚠️ 1순위 개선',right-4,bottom-4);
    c.restore();
  }};

  const labelPlugin={id:'scatterLabels',afterDatasetsDraw(chart){
    const meta=chart.getDatasetMeta(0);
    const c=chart.ctx;c.save();c.font='bold 12px Pretendard,sans-serif';c.fillStyle='#333';c.textAlign='center';c.textBaseline='bottom';
    meta.data.forEach((pt,i)=>{
      const bw=pt.options.radius||8;
      c.fillText(items[i].label,pt.x,pt.y-bw-3);
    });
    c.restore();
  }};

  destroyChart('scatterChart');
  G.chartInstances['scatterChart']=new Chart(canvas,{
    type:'bubble',data:{datasets:[{
      label:'계약종별',
      data:items.map(i=>({x:i.x,y:i.y,r:Math.max(8,Math.min(30,i.cnt/Math.max(...items.map(j=>j.cnt))*30))})),
      backgroundColor:items.map(i=>rdYlGn(i.y)),
      borderColor:'#fff',borderWidth:1
    }]},
    plugins:[crosshairPlugin,labelPlugin],
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:(ctx)=>{const i=items[ctx.dataIndex];return `${i.label}: 만족도 ${i.y.toFixed(1)}점, 비중 ${i.x.toFixed(1)}%, ${i.cnt}건`;}}}},
      scales:{x:{title:{display:true,text:'건수 비중(%)',font:{size:13}},ticks:{font:{size:12}},min:-3,max:xMax},y:{title:{display:true,text:'평균 만족도',font:{size:13}},ticks:{font:{size:12}},min:yMin,max:yMax}}}
  });

  const ann=document.getElementById('scatterAnnotations');
  if(ann){
    let ah='';
    const danger=items.filter(i=>i.x>=xMid&&i.y<yMid);
    const watch=items.filter(i=>i.x<xMid&&i.y<yMid);
    if(danger.length>0){
      ah+=`<div style="background:#f0f2f5;border-left:4px solid #c62828;border-radius:8px;padding:8px 12px;font-size:.85em;margin-top:6px;">🚨 <b>1순위 개선:</b> ${danger.map(d=>d.label).join(', ')} — 비중이 높은데 만족도가 낮습니다.</div>`;
    }
    if(watch.length>0){
      ah+=`<div style="background:#f0f2f5;border-left:4px solid #e65100;border-radius:8px;padding:8px 12px;font-size:.85em;margin-top:6px;">⚡ <b>특이 리스크:</b> ${watch.map(d=>d.label).join(', ')} — 소수이지만 점수가 극도로 낮아 민원 위험</div>`;
    }
    ann.innerHTML=ah;
  }
}

function buildSolHeatmap(ofcData,selOff){
  if(!G.M.business||!G.M.contract) return '';
  const bizTypes=[...new Set(ofcData.map(d=>d._business).filter(Boolean))];
  const ctTypes=[...new Set(ofcData.map(d=>d._contract).filter(Boolean))];
  const ctOrder=['주택용','일반용','산업용','농사용','교육용','가로등'];
  const orderedCt=ctOrder.filter(c=>ctTypes.includes(c)).concat(ctTypes.filter(c=>!ctOrder.includes(c)));

  // Compute pivot
  const pivot={},cntPivot={};
  ofcData.forEach(d=>{
    if(!d._business||!d._contract||d._score==null) return;
    const key=d._business+'|'+d._contract;
    if(!pivot[key]) pivot[key]={s:0,c:0};
    pivot[key].s+=d._score;pivot[key].c++;
  });

  // All values for color scale
  const allVals=Object.values(pivot).map(v=>v.s/v.c);
  const vmin=allVals.length>0?Math.min(...allVals):0;
  const vmax=allVals.length>0?Math.max(...allVals):100;

  // Sort biz by average score (ascending)
  const bizAvgs={};
  bizTypes.forEach(biz=>{
    const bd=ofcData.filter(d=>d._business===biz&&d._score!=null);
    bizAvgs[biz]=bd.length>0?bd.reduce((s,d)=>s+d._score,0)/bd.length:0;
  });
  const sortedBiz=bizTypes.sort((a,b)=>(bizAvgs[a]||0)-(bizAvgs[b]||0));

  function hmC(v){
    if(v==null||isNaN(v)) return '';
    const t=Math.max(0,Math.min(1,(v-vmin)/(vmax-vmin||1)));
    const stops=[[0,192,57,43],[0.2,230,126,34],[0.4,244,208,63],[0.6,168,216,107],[0.8,88,179,104],[1,30,107,62]];
    let r=30,g=107,b=62;
    for(let i=0;i<stops.length-1;i++){
      const [t0,r0,g0,b0]=stops[i],[t1,r1,g1,b1]=stops[i+1];
      if(t<=t1){const p=(t-t0)/(t1-t0||1);r=Math.round(r0+(r1-r0)*p);g=Math.round(g0+(g1-g0)*p);b=Math.round(b0+(b1-b0)*p);break;}
    }
    const lum=(r*299+g*587+b*114)/1000;
    const fc=lum<140?'#fff':'#333';
    return `background:rgba(${r},${g},${b},0.9);color:${fc};font-weight:bold;`;
  }

  const bdr='#b0b0b0',hdr='#1a3a6c';
  let h=`<div class="tbl-wrap"><table class="tbl">`;
  h+=`<tr style="background:${hdr};font-weight:bold;"><th>업무유형</th>`;
  orderedCt.forEach(c=>{h+=`<th>${c}</th>`;});
  h+=`<th>합계</th></tr>`;

  sortedBiz.forEach(biz=>{
    h+=`<tr><td style="background:#fff;font-weight:bold;white-space:nowrap;font-size:.92em;">${biz}</td>`;
    orderedCt.forEach(ct=>{
      const key=biz+'|'+ct;
      const p=pivot[key];
      if(p){
        const v=p.s/p.c;
        h+=`<td style="${hmC(v)}">${v.toFixed(1)} <span style="font-size:.8em;opacity:.7;">(${p.c}건)</span></td>`;
      }else{
        h+=`<td>-</td>`;
      }
    });
    // Total
    const bd=ofcData.filter(d=>d._business===biz&&d._score!=null);
    const bAvg=bd.length>0?bd.reduce((s,d)=>s+d._score,0)/bd.length:null;
    h+=`<td style="font-weight:bold;">${bAvg!=null?bAvg.toFixed(1):'-'} <span style="font-size:.8em;color:#444;">(${bd.length}건)</span></td>`;
    h+=`</tr>`;
  });

  // Bottom row: averages
  h+=`<tr style="background:${hdr};font-weight:bold;"><td>평균</td>`;
  let totalAll=0;
  orderedCt.forEach(ct=>{
    const cd=ofcData.filter(d=>d._contract===ct&&d._score!=null);
    const avg=cd.length>0?cd.reduce((s,d)=>s+d._score,0)/cd.length:null;
    totalAll+=cd.length;
    h+=`<td style="${avg!=null?hmC(avg):''}">${avg!=null?avg.toFixed(1):'-'} <span style="font-size:.8em;opacity:.7;">(${cd.length}건)</span></td>`;
  });
  const allAvg=ofcData.filter(d=>d._score!=null);
  const tAvg=allAvg.reduce((s,d)=>s+d._score,0)/allAvg.length;
  h+=`<td style="font-weight:bold;">${tAvg.toFixed(1)} <span style="font-size:.8em;color:#444;">(${totalAll}건)</span></td>`;
  h+=`</tr></table></div>`;
  return h;
}

function buildRiskCards(ofcData,selOff){
  const el=document.getElementById('solRiskCards');
  if(!el||!G.M.business||!G.M.contract) return;
  const globalAvg=G.avgScore;

  const combos={};
  ofcData.forEach(d=>{
    if(!d._contract||!d._business||d._score==null) return;
    const key=d._contract+'|'+d._business;
    if(!combos[key]) combos[key]={ct:d._contract,biz:d._business,sum:0,cnt:0,scores:[],vocs:[]};
    combos[key].sum+=d._score;combos[key].cnt++;combos[key].scores.push(d._score);
    if(d._voc&&!isVocEmpty(d._voc)&&d._score<70) combos[key].vocs.push(d._voc);
  });

  const belowAvg=Object.values(combos).filter(c=>c.sum/c.cnt<globalAvg);
  const realRisk=belowAvg.filter(c=>c.cnt>=10).map(c=>{
    const avg=c.sum/c.cnt;
    return {...c,avg,impact:c.cnt*(globalAvg-avg),voc:c.vocs[0]?c.vocs[0].substring(0,40):''};
  }).sort((a,b)=>b.impact-a.impact).slice(0,3);

  const dropRisk=belowAvg.filter(c=>c.cnt<10).map(c=>{
    const avg=c.sum/c.cnt;
    return {...c,avg,voc:c.vocs[0]?c.vocs[0].substring(0,40):''};
  }).sort((a,b)=>a.avg-b.avg).slice(0,3);

  let html='';
  if(realRisk.length>0||dropRisk.length>0){
    html+=`<hr class="divider"><div class="risk-header"><span style="font-size:1.1em;font-weight:800;">🚨 리스크 진단 — ${selOff}</span> <span style="font-size:.82em;opacity:.8;margin-left:10px;">업무×계약종별 조합별 우선 개선 대상</span></div>`;
  }
  if(realRisk.length>0){
    html+=`<p style="font-weight:700;margin:8px 0;">실질적 리스크 TOP 3 — 건수 多 & 평균 이하</p><p style="font-size:.82em;color:#888;margin:-4px 0 8px;">카드를 클릭하면 상세 분석이 열립니다.</p><div class="grid-3">`;
    realRisk.forEach((r,i)=>{
      const badge=['①','②','③'][i];
      html+=`<div class="risk-card" style="cursor:pointer;" onclick="openDrill('${r.ct}','${r.biz}')">
        <div class="label">리스크 ${badge}</div>
        <div class="title">${r.ct} × ${r.biz}</div>
        <div class="score">${r.avg.toFixed(1)}점</div>
        <div style="font-size:.85em;color:#555;">${r.cnt}건 · 임팩트 ${r.impact.toFixed(0)}</div>
        ${r.voc?`<div style="font-size:.82em;color:#888;margin-top:4px;">"${r.voc}…"</div>`:''}
        <div style="font-size:.88em;color:#1565c0;margin-top:6px;font-weight:600;">🔍 상세 원인 분석</div>
      </div>`;
    });
    html+=`</div>`;
  }
  if(dropRisk.length>0){
    html+=`<p style="font-weight:700;margin:12px 0;">⚡ 급락 리스크 TOP 3 — 건수 少 & 점수 급락</p><p style="font-size:.82em;color:#888;margin:-4px 0 8px;">소수 응답이지만 점수가 급락한 조합입니다.</p><div class="grid-3">`;
    dropRisk.forEach((r,i)=>{
      const badge=['①','②','③'][i];
      html+=`<div class="risk-card drop-card" style="cursor:pointer;" onclick="openDrill('${r.ct}','${r.biz}')">
        <div class="label">급락 ${badge}</div>
        <div class="title">${r.ct} × ${r.biz}</div>
        <div class="score">${r.avg.toFixed(1)}점</div>
        <div style="font-size:.85em;color:#555;">${r.cnt}건 (소량)</div>
        ${r.voc?`<div style="font-size:.82em;color:#888;margin-top:4px;">"${r.voc}…"</div>`:''}
        <div style="font-size:.88em;color:#1565c0;margin-top:6px;font-weight:600;">🔍 상세 원인 분석</div>
      </div>`;
    });
    html+=`</div>`;
  }
  if(!realRisk.length&&!dropRisk.length){
    html+=`<div class="card-teal" style="margin-top:16px;">모든 업무×계약종별 조합이 본부 평균 이상입니다.</div>`;
  }
  el.innerHTML=html;
}

function openDrill(ct,biz){
  const el=document.getElementById('solDrill');
  if(!el) return;
  const selOff=document.getElementById('solOfficeSel').value;
  const allData=G.data.filter(d=>d._score!=null);
  const drillData=allData.filter(d=>d._office===selOff&&d._contract===ct&&d._business===biz);
  const n=drillData.length;

  if(n===0){el.innerHTML='<div class="card"><p>해당 조합의 데이터가 없습니다.</p></div>';return;}

  const chartH=Math.max(200,Math.min(320,G.indivScores.length*40+60));
  let html=`<hr class="divider">
  <div style="background:linear-gradient(135deg,#1a237e 0%,#283593 60%,#1565c0 100%);border-radius:10px;padding:14px 20px;color:white;margin:16px 0 12px;display:flex;justify-content:space-between;align-items:center;">
    <div><span style="font-size:1.2em;font-weight:800;">🔬 심층 진단 — ${selOff} · ${ct} × ${biz}</span>
    <span style="font-size:.88em;opacity:.8;margin-left:10px;">범인 특정 → VOC</span></div>
    <button onclick="document.getElementById('solDrill').innerHTML=''" style="background:rgba(255,255,255,.2);border:none;color:white;padding:6px 16px;border-radius:6px;cursor:pointer;font-size:.92em;">✕ 닫기</button>
  </div>`;

  html+=`<p style="margin:8px 0;font-size:1em;"><b>타겟</b>: [${ct}] 고객의 [${biz}] — <b>${n}건</b></p>`;
  if(n<10) html+=`<div style="background:#f0f2f5;border-left:4px solid #e65100;border-radius:8px;padding:8px 12px;font-size:.92em;margin-bottom:12px;">⚠️ 데이터 수가 적어(<b>${n}건</b>) 특정 사례에 의한 왜곡 가능성이 있으니 <b>VOC 원문을 중심으로</b> 판단하세요.</div>`;

  const hasItems=G.indivScores.length>0;
  html+=`<div class="grid-2" style="align-items:start;">`;

  // Left: item-level scores
  html+=`<div>`;
  if(hasItems){
    html+=`<p style="font-weight:700;margin-bottom:8px;font-size:1.05em;">📊 세부항목별 만족도 — 범인 특정</p>`;
    html+=`<div style="position:relative;height:${chartH}px;"><canvas id="drillItemChart"></canvas></div>`;
  }
  html+=`</div>`;

  // Right: VOC list
  html+=`<div>`;
  if(G.M.voc){
    const vocRows=drillData.filter(d=>!isVocEmpty(d._voc)).slice(0,10);
    html+=`<p style="font-weight:700;margin-bottom:8px;font-size:1.05em;">📝 실제 VOC 원문</p>`;
    if(vocRows.length>0){
      html+=`<div style="background:#f0f2f5;border-radius:8px;padding:12px;max-height:${chartH+40}px;overflow-y:auto;">`;
      vocRows.forEach(d=>{
        let vocH=escHtml(d._voc);
        VOC_HIGHLIGHT_KW.forEach(kw=>{if(vocH.includes(kw))vocH=vocH.split(kw).join('<mark style="background:#ffeb3b">'+kw+'</mark>');});
        const receipt=G.M.receipt_no&&d[G.M.receipt_no]?`<span style="color:#1976d2;font-weight:600;font-size:.85em;">[${escHtml(String(d[G.M.receipt_no]))}]</span> `:'';
        html+=`<div style="border-left:3px solid #ef9a9a;padding:5px 10px;margin-bottom:6px;font-size:.93em;">${receipt}${vocH}</div>`;
      });
      html+=`</div>`;
    }else{
      html+=`<p style="font-size:.93em;color:#888;">VOC 원문이 없습니다.</p>`;
    }
  }
  html+=`</div></div>`;

  el.innerHTML=html;
  el.scrollIntoView({behavior:'smooth',block:'start'});

  // Draw item chart
  if(hasItems){
    setTimeout(()=>{
      const itemScores={};
      G.indivScores.forEach(sc=>{
        const vals=drillData.map(d=>d['_is_'+sc]).filter(v=>v!=null);
        if(vals.length>0) itemScores[sc]=vals.reduce((a,b)=>a+b,0)/vals.length;
      });
      if(Object.keys(itemScores).length===0) return;
      const labels=Object.keys(itemScores);
      const vals=Object.values(itemScores);
      const worstIdx=vals.indexOf(Math.min(...vals));
      const colors=vals.map((v,i)=>i===worstIdx?'#e65100':v<G.avgScore?'#80CBC4':'#00897B');

      const barEndLabels={id:'barEndLabels',afterDatasetsDraw(chart){
        const c=chart.ctx;c.save();c.font='bold 13px Pretendard,sans-serif';c.fillStyle='#333';c.textAlign='left';c.textBaseline='middle';
        const meta=chart.getDatasetMeta(0);
        meta.data.forEach((bar,i)=>{c.fillText(vals[i].toFixed(1),bar.x+6,bar.y);});
        c.restore();
      }};
      const avgLinePlugin={id:'avgLine',afterDraw(chart){
        const sx=chart.scales.x;const c=chart.ctx;
        const xPos=sx.getPixelForValue(G.avgScore);
        c.save();c.setLineDash([6,4]);c.strokeStyle='#1a3a6c';c.lineWidth=1;
        c.beginPath();c.moveTo(xPos,chart.chartArea.top);c.lineTo(xPos,chart.chartArea.bottom);c.stroke();
        c.setLineDash([]);c.font='13px Pretendard,sans-serif';c.fillStyle='#1a3a6c';c.textAlign='left';c.textBaseline='bottom';
        c.fillText('본부 '+G.avgScore.toFixed(1),xPos+4,chart.chartArea.top+14);
        c.restore();
      }};

      destroyChart('drillItemChart');
      G.chartInstances['drillItemChart']=new Chart(document.getElementById('drillItemChart'),{
        type:'bar',data:{labels,datasets:[{label:'만족도',data:vals,backgroundColor:colors,borderRadius:4}]},
        plugins:[barEndLabels,avgLinePlugin],
        options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
          plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.raw.toFixed(1)}점`}}},
          scales:{x:{min:Math.max(0,Math.min(...vals)-10),max:110},y:{ticks:{font:{size:13}}}}
        }
      });

      // "범인 확정" text
      const worstName=labels[worstIdx];
      const worstScore=vals[worstIdx];
      const chartWrap=document.getElementById('drillItemChart').parentElement;
      const culprit=document.createElement('div');
      culprit.style.cssText='background:#f0f2f5;border-left:4px solid #c62828;border-radius:8px;padding:10px 14px;font-size:.95em;margin-top:10px;margin-bottom:24px;';
      culprit.innerHTML=`🎯 <b>범인 확정</b>: ${ct} 계약종별 · ${biz} 업무에서 <b>${worstName}</b> 항목이 <b style="color:#c62828;">${worstScore.toFixed(1)}점</b> (본부 대비 ${(worstScore-G.avgScore)>=0?'+':''}${(worstScore-G.avgScore).toFixed(1)}점)`;
      chartWrap.appendChild(culprit);
    },80);
  }
}

function buildVocInsight(ofcData,selOff){
  const el=document.getElementById('solVocInsight');
  if(!el||!G.M.voc) return;

  const vocPaired=ofcData.filter(d=>!isVocEmpty(d._voc)&&d._score!=null);
  if(vocPaired.length===0){el.innerHTML='';return;}

  const texts=vocPaired.map(d=>d._voc);
  const scores=vocPaired.map(d=>d._score);
  const result=extractVocPhrases(texts,scores);

  const hasNotable=result.notable.length>0;
  const hasPhrases=result.neg.length>0||result.pos.length>0;
  if(!hasNotable&&!hasPhrases){el.innerHTML='';return;}

  let html=`<hr class="divider" style="margin-top:28px;"><div style="background:#f8f9fb;border:1px solid #e0e4ea;border-radius:10px;padding:18px 20px;margin-top:4px;">`;
  html+=`<div style="font-size:1.15em;font-weight:800;color:#1a3a6c;margin-bottom:14px;">📋 VOC 인사이트 — ${selOff}</div>`;

  // Customer requests
  if(hasNotable){
    html+=`<div class="purple-header" style="margin-bottom:6px;"><span style="font-size:1.05em;font-weight:800;">고객 요청사항</span> <span style="font-size:.82em;opacity:.8;margin-left:10px;">고객이 구체적 개선을 요청한 의견 ${result.notable.length}건</span></div>`;
    result.notable.slice(0,7).forEach(([txt,sc])=>{
      const display=txt.length>120?txt.substring(0,120)+'...':txt;
      const scColor=sc&&sc<60?'#c62828':sc&&sc<80?'#e65100':'#555';
      const scTag=sc!=null?`<span style="color:${scColor};font-size:.78em;font-weight:600;margin-left:8px;">${sc.toFixed(0)}점</span>`:'';
      html+=`<div class="voc-item">"${display}"${scTag}</div>`;
    });
    html+=`<p style="font-size:.82em;color:#888;margin-top:4px;">※ '~해주세요', '~하면 좋겠다' 등 고객이 구체적 행동을 요청한 의견입니다.</p>`;
  }

  // Positive/Negative phrase summary
  if(hasPhrases){
    if(hasNotable) html+=`<div style="border-top:1px solid #e0e4ea;margin:14px 0;"></div>`;
    html+=`<div class="grid-2">`;
    if(result.neg.length>0){
      html+=`<div style="background:#fff;border-left:4px solid #c62828;border-radius:8px;padding:12px 14px;font-size:.88em;"><b style="color:#c62828;">부정 구절 TOP</b><br>`;
      result.neg.slice(0,5).forEach(([label,cnt])=>{html+=`<span style="color:#c62828;">&#9679;</span> ${label} (${cnt}건)<br>`;});
      html+=`</div>`;
    }
    if(result.pos.length>0){
      html+=`<div style="background:#fff;border-left:4px solid #2e7d32;border-radius:8px;padding:12px 14px;font-size:.88em;"><b style="color:#2e7d32;">긍정 구절 TOP</b><br>`;
      result.pos.slice(0,5).forEach(([label,cnt])=>{html+=`<span style="color:#2e7d32;">&#9679;</span> ${label} (${cnt}건)<br>`;});
      html+=`</div>`;
    }
    html+=`</div>`;
  }

  html+=`</div>`;
  el.innerHTML=html;
}

function renderTab4(){
  const el=document.getElementById('t3');
  const data=G.data;
  const hasDate=data.some(d=>d._date!=null);

  if(!hasDate){
    el.innerHTML='<div class="card"><p>날짜 정보가 없어 주간 리포트를 생성할 수 없습니다. 엑셀에 접수일자/접수번호 컬럼이 있는지 확인해주세요.</p></div>';
    return;
  }

  // This week = all uploaded data
  const datesValid=data.filter(d=>d._date!=null).map(d=>d._date);
  const dateMin=new Date(Math.min(...datesValid.map(d=>d.getTime())));
  const dateMax=new Date(Math.max(...datesValid.map(d=>d.getTime())));

  const thisWeek=data.slice(); // all data = this week
  const lastEnd=new Date(dateMin);lastEnd.setDate(lastEnd.getDate()-1);
  const lastStart=new Date(lastEnd);lastStart.setDate(lastStart.getDate()-6);
  const lastWeek=data.filter(d=>d._date&&d._date>=lastStart&&d._date<dateMin);

  const fmtD=d=>`${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getDate().toString().padStart(2,'0')}`;

  let html=`<div style="background:#eef3fb;border-radius:8px;padding:10px 16px;margin-bottom:12px;font-size:.88em;color:#333;">
    <b>기준일:</b> ${dateMax.toISOString().slice(0,10)} | <b>금주:</b> ${fmtD(dateMin)}~${fmtD(dateMax)} (${thisWeek.length.toLocaleString()}건) | <b>전주:</b> ${fmtD(lastStart)}~${fmtD(lastEnd)} (${lastWeek.length.toLocaleString()}건)</div>`;

  // Office selector
  html+=`<select id="wrViewSel" onchange="renderWeeklyContent()" style="margin-bottom:16px;"><option value="전체">전체 (본부 종합)</option>`;
  if(G.M.office) G.offices.forEach(o=>{html+=`<option value="${o}">${o}</option>`;});
  html+=`</select><div id="weeklyContent"></div>`;

  el.innerHTML=html;
  renderWeeklyContent();
}

function renderWeeklyContent(){
  const el=document.getElementById('weeklyContent');
  if(!el) return;
  const selView=document.getElementById('wrViewSel').value;
  const data=G.data;

  // Date ranges
  const datesValid=data.filter(d=>d._date!=null).map(d=>d._date);
  const dateMin=new Date(Math.min(...datesValid.map(d=>d.getTime())));

  const filter=selView==='전체'?d=>true:d=>d._office===selView;
  const twView=data.filter(filter);
  const lwView=data.filter(d=>{
    if(!d._date) return false;
    const lastEnd=new Date(dateMin);lastEnd.setDate(lastEnd.getDate()-1);
    const lastStart=new Date(lastEnd);lastStart.setDate(lastStart.getDate()-6);
    return d._date>=lastStart&&d._date<dateMin&&filter(d);
  });

  const hdr='#1a3a6c',bdr='#b0b0b0';
  let html='';

  // Section 1: Weekly survey results
  html+=`<p class="sec-head">1. 주간 조사 결과</p>`;

  if(G.M.office&&G.M.score){
    const rowLabel=selView==='전체'?'구분':'업무유형';
    html+=`<div class="tbl-wrap" id="weeklyTbl1"><table class="tbl">`;
    html+=`<tr style="background:${hdr};font-weight:bold;"><th rowspan="2">${rowLabel}</th><th rowspan="2">업무처리<br>건수</th><th rowspan="2">응답<br>호수</th><th colspan="2">조사결과</th><th rowspan="2">비고</th></tr>`;
    html+=`<tr style="background:${hdr};font-weight:bold;font-size:.92em;"><th>금주</th><th>전주</th></tr>`;

    if(selView==='전체'){
      const offices=sortOffices([...new Set(data.filter(d=>d._office).map(d=>d._office))]);
      const twScores={};
      const rows=[];
      offices.forEach(ofc=>{
        const tw=twView.filter(d=>d._office===ofc);
        const lw=lwView.filter(d=>d._office===ofc);
        const twScored=tw.filter(d=>d._score!=null);
        const lwScored=lw.filter(d=>d._score!=null);
        const twAvg=twScored.length>0?twScored.reduce((s,d)=>s+d._score,0)/twScored.length:null;
        const lwAvg=lwScored.length>0?lwScored.reduce((s,d)=>s+d._score,0)/lwScored.length:null;
        twScores[ofc]=twAvg;
        rows.push([ofc,tw.length,twScored.length,twAvg,lwAvg]);
      });

      // Rank
      const validScores=Object.entries(twScores).filter(([,v])=>v!=null).sort((a,b)=>b[1]-a[1]);
      const rankMap={};validScores.forEach(([k],i)=>rankMap[k]=i+1);
      const totalRanked=validScores.length;

      rows.forEach(([ofc,tt,tr,twS,lwS])=>{
        const rankStr=rankMap[ofc]?`${rankMap[ofc]}/${totalRanked}위`:'-';
        const twDelta=fvDelta(twS,lwS);
        html+=`<tr><td style="background:#fff;font-weight:bold;">${ofc}</td><td>${tt.toLocaleString()}</td><td>${tr.toLocaleString()}</td><td style="font-weight:bold;">${twDelta}</td><td>${fv3(lwS)}</td><td>${rankStr}</td></tr>`;
      });

      // Total
      const twAll=twView.filter(d=>d._score!=null);
      const lwAll=lwView.filter(d=>d._score!=null);
      const twAllAvg=twAll.length>0?twAll.reduce((s,d)=>s+d._score,0)/twAll.length:null;
      const lwAllAvg=lwAll.length>0?lwAll.reduce((s,d)=>s+d._score,0)/lwAll.length:null;
      html+=`<tr style="background:#f0f4f8;font-weight:bold;"><td>합계</td><td>${twView.length.toLocaleString()}</td><td>${twAll.length.toLocaleString()}</td><td>${fvDelta(twAllAvg,lwAllAvg)}</td><td>${fv3(lwAllAvg)}</td><td>-</td></tr>`;
    }else{
      const twScored=twView.filter(d=>d._score!=null);
      const lwScored=lwView.filter(d=>d._score!=null);
      const twAvg=twScored.length>0?twScored.reduce((s,d)=>s+d._score,0)/twScored.length:null;
      const lwAvg=lwScored.length>0?lwScored.reduce((s,d)=>s+d._score,0)/lwScored.length:null;
      html+=`<tr><td style="background:#fff;font-weight:bold;">${selView}</td><td>${twView.length.toLocaleString()}</td><td>${twScored.length.toLocaleString()}</td><td style="font-weight:bold;">${fvDelta(twAvg,lwAvg)}</td><td>${fv3(lwAvg)}</td><td>-</td></tr>`;
    }

    html+=`</table><div style="text-align:right;font-size:.8em;margin-top:4px;color:#555;">(단위 : 건, 점)</div></div>`;
    html+=`<button class="btn btn-dl btn-sm" onclick="downloadExcel(document.querySelector('#weeklyTbl1 table').outerHTML,'주간_조사결과.xls')">Excel 다운로드</button>`;
  }

  html+=`<hr class="divider">`;

  // Section 2: Business type analysis (응답호수 기준)
  html+=`<p class="sec-head">2. 업무유형별 조사결과 분석</p>`;
  if(G.M.business&&G.M.score){
    const twResponded=twView.filter(d=>d._score!=null);
    const bizTypes=sortBiz([...new Set(twResponded.map(d=>d._business).filter(Boolean))]);
    html+=`<div class="tbl-wrap" id="weeklyTbl2"><table class="tbl">`;
    html+=`<tr style="background:${hdr};font-weight:bold;"><th>구분</th>${bizTypes.map(b=>`<th>${b}</th>`).join('')}</tr>`;

    // Row: responded count
    html+=`<tr><td style="background:#fff;font-weight:bold;">응답건수</td>`;
    bizTypes.forEach(bt=>{
      const cnt=twResponded.filter(d=>d._business===bt).length;
      html+=`<td>${cnt.toLocaleString()}</td>`;
    });
    html+=`</tr>`;

    // Row: score
    html+=`<tr><td style="background:#fff;font-weight:bold;">점수</td>`;
    bizTypes.forEach(bt=>{
      const scored=twResponded.filter(d=>d._business===bt);
      const avg=scored.length>0?scored.reduce((s,d)=>s+d._score,0)/scored.length:null;
      html+=`<td style="font-weight:bold;">${fv3(avg)}</td>`;

    </div>`;

    html+=`<div id="fbTableWrap"></div>`;
  }

  html+=`<hr class="divider">`;

  // Section 4: Cooperation requests
  html+=`<p class="sec-head">4. 협조요청 사항</p>`;

    &nbsp;&nbsp;1. 고객 응대 시 <b>친절하고 정중한 응대</b>를 통해 고객 만족도 향상에 적극 협조 바랍니다.<br>
    &nbsp;&nbsp;2. 고객 방문 시 <b>홍보용품 증정</b> 등 고객 감동 활동을 적극 실시해 주시기 바랍니다.<br>
    &nbsp;&nbsp;3. CS 조사 대상 고객에게 <b>조사 참여를 당부</b>하여 응답률 향상에 협조 부탁드립니다.<br><br>
    <b>특이 민원 및 긴급 사안</b><br>
    &nbsp;&nbsp;- 고객 불만 사항 및 특이 민원 발생 시 <b>즉시 보고</b>하여 주시기 바랍니다.<br>
    &nbsp;&nbsp;- 반복 민원 및 법적 분쟁 가능성이 있는 건은 <b>사전 보고 후 대응</b>해 주시기 바랍니다.
  </div>`;

  el.innerHTML=html;
  if(G._fbCache) filterFeedback('전체');
}

function filterFeedback(type){
  G._fbFilter=type;
  ['fbAll','fbPos','fbNeu','fbNeg'].forEach(id=>{
    const c=document.getElementById(id);
    if(c) c.style.outline=id==='fb'+{전체:'All',긍정:'Pos',중립:'Neu',부정:'Neg'}[type]?'3px solid #1a3a6c':'none';
  });
  const wrap=document.getElementById('fbTableWrap');
  if(!wrap||!G._fbCache) return;
  const filtered=type==='전체'?G._fbCache:G._fbCache.filter(d=>d._fbSent===type);
  const rows=filtered.filter(d=>!isVocEmpty(d._voc)).slice(0,100);
  const sentOrder={'부정':0,'중립':1,'긍정':2};
  rows.sort((a,b)=>(sentOrder[a._fbSent]||1)-(sentOrder[b._fbSent]||1));

  let h=`<div class="tbl-wrap" style="max-height:420px;"><table class="tbl" style="text-align:left;">`;
  h+=`<tr style="background:#1a3a6c;color:#fff;font-weight:bold;">`;
  if(G.M.office) h+=`<th style="white-space:nowrap;min-width:80px;">지사</th>`;
  h+=`<th style="white-space:nowrap;min-width:72px;">감성분류</th>`;
  if(G.M.business) h+=`<th style="white-space:nowrap;min-width:80px;">업무구분</th>`;
  if(G.M.score) h+=`<th style="white-space:nowrap;min-width:72px;">종합점수</th>`;
  h+=`<th>서술의견</th></tr>`;

  rows.forEach(d=>{
    const sent=d._fbSent;
    const rowBg=sent==='부정'?'background:#fafafa;':'';
    const badge=sent==='부정'?'<span class="badge badge-neg">부정</span>':sent==='긍정'?'<span class="badge badge-pos">긍정</span>':'<span class="badge badge-neu">중립</span>';
    h+=`<tr style="${rowBg}">`;
    if(G.M.office) h+=`<td style="white-space:nowrap;">${d._office}</td>`;
    h+=`<td style="text-align:center;">${badge}</td>`;
    if(G.M.business) h+=`<td style="white-space:nowrap;">${d._business}</td>`;
    if(G.M.score) h+=`<td style="text-align:center;">${d._score!=null?d._score.toFixed(1):'-'}</td>`;
    let vocHtml=escHtml(d._voc);
    VOC_HIGHLIGHT_KW.forEach(kw=>{if(vocHtml.includes(kw))vocHtml=vocHtml.split(kw).join(`<mark>${kw}</mark>`);});
    h+=`<td>${vocHtml}</td></tr>`;
  });
  h+=`</table></div>`;
  if(rows.length===0) h=`<div style="text-align:center;color:#888;padding:24px;">해당 분류의 VOC가 없습니다.</div>`;
  wrap.innerHTML=h;
}

function fvDelta(cur,prev){
  if(cur==null||isNaN(cur)) return '-';
  let s=cur.toFixed(3);
  if(prev!=null&&!isNaN(prev)){
    const d=cur-prev;
    const c=d>=0?'#1565C0':'#C62828';
    const arr=d>=0?'&#9651;':'&#9661;';
    s+=` <span style="color:${c};font-size:.88em;">(${arr}${Math.abs(d).toFixed(3)})</span>`;
  }
  return s;
}
function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

/* ═══════════════════════════════════════════════════════════
   TAB 5: 민원 조기 경보
   ═══════════════════════════════════════════════════════════ */
function renderTab5(){
  const el=document.getElementById('t4');
  const data=G.data;

  let html=`<p class="sec-head">잠재적 민원고객 사전케어 리스트</p>
    <div class="card-red">
      <b>추출 기준</b><br>
      1. 종합 점수 50점 이하<br>
      2. 서술 의견에 부정적 키워드가 포함<br>
      두 조건을 <b>모두 충족</b>하는 고객만 잠재 민원고객으로 추출합니다.<br>
      해당 고객에게 <b>72시간 이내</b> 선제적으로 연락하여 민원 발생을 사전에 차단하세요.
    </div>`;

  if(!G.M.voc){
    html+=`<div class="card"><p>VOC 컬럼이 필요합니다.</p></div>`;
    el.innerHTML=html;return;
  }

  // Extract potential complainants
  const negList=data.filter(d=>{
    const lowScore=d._score!=null&&d._score<=50;
    return lowScore&&d._neg;
  });

  const negN=negList.length;
  const respondedCnt=data.filter(d=>d._score!=null).length;
  const negR=negN/Math.max(respondedCnt,1)*100;
  const negAvg=negList.length>0?negList.reduce((s,d)=>s+d._score,0)/negList.length:0;
  const safeR=respondedCnt>0?(100-negR).toFixed(1):'0';

  html+=`<div class="grid-3" style="margin:16px 0;">
    <div class="kpi-card" style="border-top-color:#c62828;"><div class="kpi-label">🚨 잠재 민원고객 수</div><div class="kpi-value" style="color:#c62828;">${negN.toLocaleString()}명</div></div>
    <div class="kpi-card"><div class="kpi-label">📊 전체 대비 비율</div><div class="kpi-value">${negR.toFixed(1)}%</div><div class="kpi-sub">↑ 긍정 ${safeR}%</div></div>
    <div class="kpi-card"><div class="kpi-label">⭐ 민원고객 평균</div><div class="kpi-value">${negN>0?negAvg.toFixed(1)+'점':'N/A'}</div><div class="kpi-sub">${negN>0?(negAvg-G.avgScore>=0?'+':'')+(negAvg-G.avgScore).toFixed(1)+' vs 전체':''}</div></div>
  </div>`;

  if(negN>0){
    // Keyword frequency
    const kwFlat=[];
    negList.forEach(d=>{
      const s=d._voc;if(!s) return;
      DOMAIN_KW.forEach(dkw=>{if(s.includes(dkw))kwFlat.push(dkw);});
      d._negKws.forEach(kw=>{
        if(!['문의','직원','고객','전화','상담','안내','처리','접수','신청','확인','이용','서비스','방문','센터','담당','답변','진행','완료','내용'].includes(kw))
          kwFlat.push(kw);
      });
    });
    const kwCounts={};kwFlat.forEach(k=>{kwCounts[k]=(kwCounts[k]||0)+1;});
    const kwTop=Object.entries(kwCounts).sort((a,b)=>b[1]-a[1]).slice(0,10);

    if(kwTop.length>0){
      html+=`<div class="grid-2"><div class="chart-box"><p style="font-weight:700;color:#1a3a6c;">불만 유형별 핵심 키워드 Top 10</p><div style="position:relative;height:220px;"><canvas id="negKwChart"></canvas></div></div>
        <div class="chart-box"><p style="font-weight:700;color:#1a3a6c;">불만 유형별 키워드 비중</p><div style="position:relative;height:220px;"><canvas id="negKwPie"></canvas></div></div></div>`;
    }

    // List table
    html+=`<p class="sec-head" style="margin-top:16px;">잠재 민원고객 - 총 <span style="color:#c62828;">${negN.toLocaleString()}명</span></p>`;
    html+=`<div class="tbl-wrap" id="negListTbl"><table class="tbl" style="text-align:left;">`;
    html+=`<tr style="background:#1a3a6c;color:#fff;font-weight:bold;">`;
    if(G.M.receipt_no) html+=`<th>접수번호</th>`;
    if(G.M.office) html+=`<th>지사</th>`;
    if(G.M.business) html+=`<th>업무구분</th>`;
    if(G.M.score) html+=`<th>점수</th>`;
    html+=`<th>서술의견</th><th>감지된 부정키워드</th></tr>`;

    negList.sort((a,b)=>(a._score||0)-(b._score||0)).slice(0,100).forEach(d=>{
      html+=`<tr style="background:#fafafa;">`;
      if(G.M.receipt_no) html+=`<td>${escHtml(d[G.M.receipt_no]||'')}</td>`;
      if(G.M.office) html+=`<td>${d._office}</td>`;
      if(G.M.business) html+=`<td>${d._business}</td>`;
      if(G.M.score) html+=`<td style="text-align:center;font-weight:bold;color:#c62828;">${d._score!=null?d._score.toFixed(1):'-'}</td>`;
      let vocH=escHtml(d._voc);
      VOC_HIGHLIGHT_KW.forEach(kw=>{if(vocH.includes(kw))vocH=vocH.split(kw).join(`<mark>${kw}</mark>`);});
      html+=`<td>${vocH}</td>`;
      html+=`<td style="color:#c62828;font-size:.88em;">${d._negKws.join(', ')}</td>`;
      html+=`</tr>`;
    });
    html+=`</table></div>`;
    html+=`<button class="btn btn-dl btn-sm" onclick="downloadExcel(document.querySelector('#negListTbl table').outerHTML,'잠재민원고객_사전케어리스트.xls')">Excel 다운로드</button>`;

    // Prediction
    html+=`<hr class="divider"><p class="sec-head">민원 예측 리포트 - 공식 민원 발전 가능성 TOP 3</p>`;
    if(G.M.business&&G.M.score){
      const predData=[];
      const totalN=data.length;
      const bizNames=[...new Set(data.map(d=>d._business).filter(Boolean))];
      bizNames.forEach(biz=>{
        const bd=data.filter(d=>d._business===biz&&d._score!=null);
        const bn=bd.length;
        const bLow=bd.filter(d=>d._score<50).length;
        const bAvg=bn>0?bd.reduce((s,d)=>s+d._score,0)/bn:0;
        const bDissatPct=bLow/Math.max(bn,1)*100;
        const bWeight=bn/Math.max(totalN,1);
        const riskScore=+(bWeight*bDissatPct*(100-bAvg)/100).toFixed(2);
        predData.push({biz,bn,bAvg:+bAvg.toFixed(1),bLow,bDissatPct:+bDissatPct.toFixed(1),riskScore});
      });
      predData.sort((a,b)=>b.riskScore-a.riskScore);
      const top3=predData.slice(0,3);

      top3.forEach((p,i)=>{
        const icon=['&#128308;','&#128992;','&#128993;'][i];
        // Domain keywords for this biz
        const bizTexts=data.filter(d=>d._business===p.biz&&d._score!=null&&d._score<70&&!isVocEmpty(d._voc)).map(d=>d._voc);
        const bkwFlat=[];
        bizTexts.forEach(t=>{DOMAIN_KW.forEach(dkw=>{if(t.includes(dkw))bkwFlat.push(dkw);});});
        const bkwCounts={};bkwFlat.forEach(k=>{bkwCounts[k]=(bkwCounts[k]||0)+1;});
        const bkwTop=Object.entries(bkwCounts).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([k])=>k);
        const kwStr=bkwTop.length>0?` - 핵심 키워드: <b>${bkwTop.join(', ')}</b>`:'';

        html+=`<p style="margin:6px 0;">${icon} <b>${i+1}위 - ${p.biz}</b> | 처리 ${p.bn.toLocaleString()}건 - 만족도 ${p.bAvg}점 - 불만족 ${p.bLow}건(${p.bDissatPct}%) - 리스크 점수 ${p.riskScore}${kwStr}</p>`;
      });
    }

  }else{
    html+=`<div class="card-teal">잠재 민원고객이 없습니다! 현재 고객 만족 수준이 양호합니다.</div>`;
  }

  el.innerHTML=html;

  // Draw keyword charts
  setTimeout(()=>{
    if(negN>0){
      const kwFlat2=[];
      negList.forEach(d=>{
        const s=d._voc;if(!s) return;
        DOMAIN_KW.forEach(dkw=>{if(s.includes(dkw))kwFlat2.push(dkw);});
        d._negKws.forEach(kw=>{
          if(!['문의','직원','고객','전화','상담','안내','처리','접수','신청','확인','이용','서비스','방문','센터','담당','답변','진행','완료','내용'].includes(kw))
            kwFlat2.push(kw);
        });
      });
      const kwCounts2={};kwFlat2.forEach(k=>{kwCounts2[k]=(kwCounts2[k]||0)+1;});
      const kwTop2=Object.entries(kwCounts2).sort((a,b)=>b[1]-a[1]).slice(0,10);

      if(kwTop2.length>0&&document.getElementById('negKwChart')){
        destroyChart('negKwChart');
        G.chartInstances['negKwChart']=new Chart(document.getElementById('negKwChart'),{
          type:'bar',data:{labels:kwTop2.map(([k])=>k),datasets:[{label:'감지횟수',data:kwTop2.map(([,v])=>v),backgroundColor:'#00897B',borderRadius:4}]},
          options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{maxRotation:45,font:{size:12}}},y:{beginAtZero:true,ticks:{font:{size:12}}}}}
        });
      }
      if(kwTop2.length>0&&document.getElementById('negKwPie')){
        const redScale=['#1a3a6c','#1a5a7c','#0d7377','#00897B','#26a69a','#4DB6AC','#80CBC4','#b2dfdb','#e0f2f1','#f0faf9'];
        const kwTotal=kwTop2.reduce((s,[,v])=>s+v,0);
        const kwPcts=kwTop2.map(([,v])=>+(v/kwTotal*100).toFixed(1));
        const kwLabels=kwTop2.map(([k],i)=>`${k} ${kwPcts[i]}%`);
        destroyChart('negKwPie');
        G.chartInstances['negKwPie']=new Chart(document.getElementById('negKwPie'),{
          type:'doughnut',data:{labels:kwLabels,datasets:[{data:kwPcts,backgroundColor:redScale,borderColor:'#fff',borderWidth:2}]},
          options:{responsive:true,maintainAspectRatio:false,cutout:'50%',plugins:{legend:{position:'bottom',labels:{font:{size:13}}},
            tooltip:{callbacks:{title:()=>'',label:function(ctx){return ctx.label;}}}
          }}
        });
      }
    }
  },0);
}
